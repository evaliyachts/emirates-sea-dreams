[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "24.18.0"
NPM_VERSION = "11.16.0"

# The exact default production hostname is a duplicate authority unless it is
# redirected before the path rewrites below. Deploy Preview and branch-deploy
# hostnames do not match this fully qualified source rule.
[[redirects]]
from = "https://yachtrentaldxb.netlify.app/*"
to = "https://yachtrentaldxb.com/:splat"
status = 301
force = true

# Exact 200 rewrites publish only evidence-cleared inner routes.
# There is intentionally no SPA fallback or route-level redirect.
[[redirects]]
from = "/yachts"
to = "/_static/yachts.html"
status = 200
force = true

[[redirects]]
from = "/services"
to = "/_static/services.html"
status = 200
force = true

