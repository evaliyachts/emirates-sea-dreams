[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "24.18.0"
NPM_VERSION = "11.16.0"

# Exact 200 rewrites publish only the three evidence-cleared inner routes.
# There is intentionally no SPA fallback and no redirect in this phase.
[[redirects]]
from = "/yachts"
to = "/_static/yachts.html"
status = 200
force = true

[[redirects]]
from = "/services"
to = "/_static/services.html"
status = 200
force = true

[[redirects]]
from = "/occasions"
to = "/_static/occasions.html"
status = 200
force = true

[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/yachts"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/services"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/occasions"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/404.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/robots.txt"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/sitemap.xml"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
