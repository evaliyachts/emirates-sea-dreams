[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/yachts"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/yachts/*"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/services"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/occasions"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/404.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/robots.txt"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/sitemap.xml"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
