[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "24.18.0"
NPM_VERSION = "11.16.0"

# Exact 200 rewrites publish only evidence-cleared inner routes.
# There is intentionally no SPA fallback and no redirect in this phase.
[[redirects]]
from = "/yachts"
to = "/_static/yachts.html"
status = 200
force = true

[[redirects]]
from = "/services"
to = "/_static/services.html"
status = 200
force = true

